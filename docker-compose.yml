services:
  app:
    container_name: fitpro-dev
    build:
      context: .
    image: fitpro:dev
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: ${APP_PORT:-3000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
